<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }} - POLI-SEG.Versi:1.2</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/sidebar.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/overlay_polygon.css') }}">
</head>
<body>

    <!-- Sidebar toggle button untuk mobile -->
    <button id="sidebarToggle" aria-label="Toggle Sidebar" class="btn btn-sm btn-dark d-md-none position-fixed" style="top:10px; left:10px; z-index:1100;">
        <i class="bi bi-list"></i> Menu
    </button>

    <!-- Wrapper flex utama -->
    <div id="wrapper" class="d-flex">
        <nav id="sidebar" class="bg-dark text-white">
            <h4 class="text-center py-3 border-bottom">POLI-SEG</h4>
            <ul class="nav flex-column px-2">
                {% for menu in menus %}
                <li class="nav-item">
                    {% if menu.children %}
                    <a class="nav-link d-flex justify-content-between align-items-center {% if menu.active %}active{% endif %}"
                       data-bs-toggle="collapse"
                       href="#collapse{{ loop.index }}" role="button"
                       aria-expanded="{{ 'true' if menu.active else 'false' }}"
                       aria-controls="collapse{{ loop.index }}">
                        <span><i class="bi {{ menu.icon }}"></i> {{ menu.name }}</span>
                        <i class="bi bi-caret-down-fill"></i>
                    </a>
                    <div class="collapse {% if menu.active %}show{% endif %}" id="collapse{{ loop.index }}">
                        <ul class="btn-toggle-nav list-unstyled fw-normal pb-1 small">
                            {% for child in menu.children %}
                            <li>
                                <a href="{{ child.url }}" class="nav-link ps-4 {% if child.active %}active{% endif %}">
                                    {{ child.name }}
                                </a>
                            </li>
                            {% endfor %}
                        </ul>
                    </div>
                    {% else %}
                    <a href="{{ menu.url }}" class="nav-link {% if menu.active %}active{% endif %}">
                        <i class="bi {{ menu.icon }}"></i> {{ menu.name }}
                    </a>
                    {% endif %}
                </li>
                {% endfor %}
            </ul>
            <hr />
            <div class="text-center small mb-3">© 2025 Reza.Redo</div>
        </nav>

        <main id="content" class="flex-grow-1">
            <h1>{{ title }}</h1>
            {% block main_content %}{% endblock %}
        </main>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Sidebar toggle script -->
    <script>
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('sidebarToggle');

        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('active');
        });

        // Tutup sidebar saat klik di luar (mobile)
        document.addEventListener('click', (e) => {
            if (!sidebar.contains(e.target) && !toggleBtn.contains(e.target)) {
                sidebar.classList.remove('active');
            }
        });
    </script>
</body>
</html>
