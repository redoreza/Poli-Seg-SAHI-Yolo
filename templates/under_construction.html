{% extends "base.html" %}

{% block main_content %}
<style>
    .under-construction-container {
        min-height: 70vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 2rem;
        animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .icon-gear {
        font-size: 5rem;
        color: #6c757d;
        animation: spin 4s linear infinite;
        margin-bottom: 1.5rem;
    }

    @keyframes spin {
        from {
            transform: rotate(0deg);
        }

        to {
            transform: rotate(360deg);
        }
    }
</style>

<div class="under-construction-container">
    <div>
        <svg class="icon-gear" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 16 16">

    </div>
    <h1 class="display-4 mb-3">Page Under Construction</h1>
    <p class="lead mb-4">Sorry, this page is still in development and will be available soon.</p>
